name: marga_void
description: "Aplikasi komunitas Marga Void."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1
  cloud_firestore: ^5.4.4
  onesignal_flutter: ^5.2.5
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  image_cropper: 11.0.0
  permission_handler: ^11.3.1
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/void.png